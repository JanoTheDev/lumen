<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Answer Overlay</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: transparent; width: 100%; overflow: hidden; font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; }

      :root {
        --ai-background: #0d0f14;
        --ai-foreground: #e6e8ee;
        --ai-accent: #5b8cff;
      }

      .card {
        margin: 8px;
        border-radius: 20px;
        padding: 15px 18px 13px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        opacity: 0;
        transform: translateY(-6px) scale(0.97);
        transition: opacity 0.2s ease, transform 0.22s cubic-bezier(0.34,1.4,0.64,1), background 0.15s ease;
        background: color-mix(in srgb, var(--ai-background) 92%, transparent);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid color-mix(in srgb, var(--ai-accent) 30%, transparent);
        box-shadow:
          0 12px 40px rgba(0,0,0,0.32),
          0 2px 8px rgba(0,0,0,0.20),
          inset 0 1px 0 color-mix(in srgb, var(--ai-foreground) 12%, transparent);
        cursor: pointer;
        user-select: none;
      }
      .card.visible { opacity: 1; transform: translateY(0) scale(1); }
      .card:hover {
        background: color-mix(in srgb, var(--ai-background) 88%, transparent);
        border-color: color-mix(in srgb, var(--ai-accent) 50%, transparent);
      }

      .text {
        font-size: 13px;
        line-height: 1.55;
        color: var(--ai-foreground);
        font-weight: 450;
        letter-spacing: -0.01em;
        word-break: break-word;
      }
      .text strong { font-weight: 650; color: var(--ai-foreground); }
      .text em { font-style: italic; }
      .text code {
        font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
        font-size: 11.5px;
        background: color-mix(in srgb, var(--ai-foreground) 8%, transparent);
        color: var(--ai-accent);
        border-radius: 4px;
        padding: 1px 5px;
      }

      .progress {
        height: 2px;
        border-radius: 99px;
        background: color-mix(in srgb, var(--ai-foreground) 10%, transparent);
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: var(--ai-accent);
        border-radius: 99px;
        transition: width 1s linear;
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <p class="text" id="text"></p>
      <div class="progress">
        <div class="progress-bar" id="bar" style="width:100%"></div>
      </div>
    </div>

    <script>
      let CLOSE_MS = 10000

      const THEME_MAP = {
        dark:            { bg: '#0d0f14', fg: '#e6e8ee', acc: '#5b8cff' },
        light:           { bg: '#ffffff', fg: '#0f172a', acc: '#2563eb' },
        'high-contrast': { bg: '#000000', fg: '#ffffff', acc: '#ffff00' },
        ocean:           { bg: '#031728', fg: '#e0f2fe', acc: '#06b6d4' },
        forest:          { bg: '#0a1f14', fg: '#dcfce7', acc: '#22c55e' },
        sunset:          { bg: '#1f1209', fg: '#fed7aa', acc: '#f97316' },
        midnight:        { bg: '#0f0a1f', fg: '#ede9fe', acc: '#a855f7' }
      }
      function applyThemeVars(name, custom) {
        const r = document.documentElement
        if (name === 'custom' && custom) {
          r.style.setProperty('--ai-background', custom.background)
          r.style.setProperty('--ai-foreground', custom.foreground)
          r.style.setProperty('--ai-accent', custom.accent)
          return
        }
        const t = THEME_MAP[name] || THEME_MAP.dark
        r.style.setProperty('--ai-background', t.bg)
        r.style.setProperty('--ai-foreground', t.fg)
        r.style.setProperty('--ai-accent', t.acc)
      }
      async function loadThemeAndConfig() {
        try {
          const cfg = await window.api?.getConfig?.()
          if (cfg) {
            applyThemeVars(cfg.theme, cfg.themeCustom)
            if (cfg.answerAutoCloseMs) CLOSE_MS = cfg.answerAutoCloseMs
          }
          window.api?.onConfigChanged?.((c) => {
            applyThemeVars(c.theme, c.themeCustom)
            if (c.answerAutoCloseMs) CLOSE_MS = c.answerAutoCloseMs
          })
        } catch (e) { applyThemeVars('dark') }
      }
      loadThemeAndConfig()

      const card = document.getElementById('card')
      const textEl = document.getElementById('text')
      const barEl = document.getElementById('bar')
      let closeTimer = null, countdownInterval = null

      function dismiss() {
        clearTimeout(closeTimer)
        clearInterval(countdownInterval)
        card.classList.remove('visible')
        setTimeout(() => window.api?.hideAnswerOverlay?.(), 220)
      }

      card.addEventListener('click', dismiss)

      function startAutoClose() {
        clearTimeout(closeTimer)
        clearInterval(countdownInterval)
        let remaining = CLOSE_MS / 1000
        barEl.style.width = '100%'
        countdownInterval = setInterval(() => {
          remaining -= 1
          barEl.style.width = ((remaining / (CLOSE_MS / 1000)) * 100) + '%'
          if (remaining <= 0) clearInterval(countdownInterval)
        }, 1000)
        closeTimer = setTimeout(dismiss, CLOSE_MS)
      }

      function renderMarkdown(raw) {
        return raw
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.*?)\*/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\n/g, '<br>')
      }

      function showAnswer(text) {
        textEl.innerHTML = renderMarkdown(text)
        card.classList.add('visible')
        startAutoClose()
        requestAnimationFrame(() => {
          const h = card.offsetHeight + 16
          window.api?.resizeAnswerOverlay?.(h)
        })
      }

      if (window.api?.onShowAnswer) window.api.onShowAnswer(showAnswer)
    </script>
  </body>
</html>
