<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Answer Overlay</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: transparent; width: 100%; overflow: hidden; font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; }

      .card {
        margin: 8px;
        border-radius: 20px;
        padding: 13px 15px 11px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        opacity: 0;
        transform: translateY(-6px) scale(0.97);
        transition: opacity 0.2s ease, transform 0.22s cubic-bezier(0.34,1.4,0.64,1), background 0.15s ease;
        background: linear-gradient(160deg, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0.10) 55%, rgba(255,255,255,0.20) 100%);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255,255,255,0.50);
        box-shadow:
          0 12px 40px rgba(0,0,0,0.16),
          0 2px 8px rgba(0,0,0,0.08),
          inset 0 2px 0 rgba(255,255,255,0.70),
          inset 0 -1px 0 rgba(0,0,0,0.05),
          inset 1px 0 0 rgba(255,255,255,0.28),
          inset -1px 0 0 rgba(255,255,255,0.18);
        cursor: pointer;
        user-select: none;
      }
      .card.visible { opacity: 1; transform: translateY(0) scale(1); }
      .card:hover {
        background: linear-gradient(160deg, rgba(255,255,255,0.40) 0%, rgba(255,255,255,0.16) 55%, rgba(255,255,255,0.26) 100%);
      }

      .text {
        font-size: 13px;
        line-height: 1.55;
        color: rgba(0,0,0,0.88);
        font-weight: 450;
        letter-spacing: -0.01em;
        word-break: break-word;
      }
      .text strong { font-weight: 650; color: rgba(0,0,0,0.95); }
      .text em { font-style: italic; }
      .text code {
        font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
        font-size: 11.5px;
        background: rgba(0,0,0,0.06);
        border-radius: 4px;
        padding: 1px 5px;
      }

      .progress {
        height: 2px;
        border-radius: 99px;
        background: rgba(0,0,0,0.06);
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: rgba(0,0,0,0.14);
        border-radius: 99px;
        transition: width 1s linear;
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <p class="text" id="text"></p>
      <div class="progress">
        <div class="progress-bar" id="bar" style="width:100%"></div>
      </div>
    </div>

    <script>
      const CLOSE_MS = 10000
      const card = document.getElementById('card')
      const textEl = document.getElementById('text')
      const barEl = document.getElementById('bar')
      let closeTimer = null, countdownInterval = null

      function dismiss() {
        clearTimeout(closeTimer)
        clearInterval(countdownInterval)
        card.classList.remove('visible')
        setTimeout(() => window.api?.hideAnswerOverlay?.(), 220)
      }

      card.addEventListener('click', dismiss)

      function startAutoClose() {
        clearTimeout(closeTimer)
        clearInterval(countdownInterval)
        let remaining = CLOSE_MS / 1000
        barEl.style.width = '100%'
        countdownInterval = setInterval(() => {
          remaining -= 1
          barEl.style.width = ((remaining / (CLOSE_MS / 1000)) * 100) + '%'
          if (remaining <= 0) clearInterval(countdownInterval)
        }, 1000)
        closeTimer = setTimeout(dismiss, CLOSE_MS)
      }

      function renderMarkdown(raw) {
        return raw
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.*?)\*/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\n/g, '<br>')
      }

      function showAnswer(text) {
        textEl.innerHTML = renderMarkdown(text)
        card.classList.add('visible')
        startAutoClose()
        requestAnimationFrame(() => {
          const h = card.offsetHeight + 16
          window.api?.resizeAnswerOverlay?.(h)
        })
      }

      if (window.api?.onShowAnswer) window.api.onShowAnswer(showAnswer)
    </script>
  </body>
</html>
