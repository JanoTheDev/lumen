<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Dwell Ring</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: transparent; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
      #ring {
        position: fixed;
        width: 44px;
        height: 44px;
        transform: translate(-50%, -50%);
        opacity: 0;
        transition: opacity 0.12s ease;
        pointer-events: none;
      }
      #ring.active { opacity: 1; }
      #ring.flash { animation: flash 0.28s ease-out; }
      @keyframes flash {
        0%   { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
        50%  { transform: translate(-50%, -50%) scale(1.35); opacity: 0.8; }
        100% { transform: translate(-50%, -50%) scale(1.7);  opacity: 0; }
      }
      circle.track {
        stroke: rgba(255,255,255,0.18);
      }
      circle.progress {
        stroke: var(--ai-accent, #7c92ff);
        filter: drop-shadow(0 0 6px color-mix(in srgb, var(--ai-accent, #7c92ff) 60%, transparent));
        transform: rotate(-90deg);
        transform-origin: center;
        transition: stroke-dashoffset 0.05s linear;
      }
      circle.core {
        fill: color-mix(in srgb, var(--ai-accent, #7c92ff) 20%, transparent);
      }
    </style>
  </head>
  <body>
    <div id="ring">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle class="track" cx="22" cy="22" r="18" fill="none" stroke-width="3" />
        <circle class="core" cx="22" cy="22" r="4" />
        <circle class="progress" cx="22" cy="22" r="18" fill="none" stroke-width="3"
                stroke-dasharray="113.1" stroke-dashoffset="113.1" stroke-linecap="round" />
      </svg>
    </div>
    <script>
      const ring = document.getElementById('ring')
      const progEl = ring.querySelector('circle.progress')
      const CIRCUM = 2 * Math.PI * 18  // ~113.1

      // Theme vars: inherit from config
      window.api?.getConfig?.().then((cfg) => {
        applyTheme(cfg?.theme, cfg?.themeCustom)
      }).catch(() => {})
      window.api?.onConfigChanged?.((cfg) => applyTheme(cfg?.theme, cfg?.themeCustom))

      const THEME_ACCENTS = {
        dark: '#5b8cff', light: '#2563eb', 'high-contrast': '#ffff00',
        ocean: '#06b6d4', forest: '#22c55e', sunset: '#f97316', midnight: '#a855f7',
      }
      function applyTheme(name, custom) {
        const r = document.documentElement
        if (name === 'custom' && custom?.accent) {
          r.style.setProperty('--ai-accent', custom.accent)
          return
        }
        const a = THEME_ACCENTS[name] ?? THEME_ACCENTS.dark
        r.style.setProperty('--ai-accent', a)
      }

      let hideTimer = null
      function setProgress({ x, y, progress, active }) {
        clearTimeout(hideTimer)
        ring.style.left = x + 'px'
        ring.style.top = y + 'px'
        const offset = CIRCUM * (1 - Math.max(0, Math.min(1, progress)))
        progEl.style.strokeDashoffset = String(offset)
        if (progress >= 0.999) {
          ring.classList.remove('active')
          ring.classList.add('flash')
          setTimeout(() => ring.classList.remove('flash'), 300)
        } else if (active) {
          ring.classList.remove('flash')
          ring.classList.add('active')
        } else {
          // Cursor moved — fade quickly
          hideTimer = setTimeout(() => {
            ring.classList.remove('active')
            progEl.style.strokeDashoffset = String(CIRCUM)
          }, 80)
        }
      }

      window.api?.onDwellProgress?.((data) => setProgress(data))
    </script>
  </body>
</html>
